name: CD Staging

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build release packages
        run: make package

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            dist/backend.tar.gz
            dist/frontend.tar.gz

  deploy-staging:
    name: Deploy To Staging
    needs: package
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_USER != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_REMOTE_DIR != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: dist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.STAGING_SSH_PORT || '22' }}" "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifacts to staging
        run: |
          scp -P "${{ secrets.STAGING_SSH_PORT || '22' }}" dist/backend.tar.gz dist/frontend.tar.gz \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:${{ secrets.STAGING_REMOTE_DIR }}/"

      - name: Deploy backend and frontend on staging
        run: |
          ssh -p "${{ secrets.STAGING_SSH_PORT || '22' }}" "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" "set -e; \
            mkdir -p '${{ secrets.STAGING_REMOTE_DIR }}/backend' '${{ secrets.STAGING_REMOTE_DIR }}/frontend'; \
            tar -xzf '${{ secrets.STAGING_REMOTE_DIR }}/backend.tar.gz' -C '${{ secrets.STAGING_REMOTE_DIR }}/backend'; \
            rm -rf '${{ secrets.STAGING_REMOTE_DIR }}/frontend'; \
            mkdir -p '${{ secrets.STAGING_REMOTE_DIR }}/frontend'; \
            tar -xzf '${{ secrets.STAGING_REMOTE_DIR }}/frontend.tar.gz' -C '${{ secrets.STAGING_REMOTE_DIR }}/frontend'; \
            systemctl restart '${{ secrets.STAGING_BACKEND_SERVICE || 'tour-guide-backend' }}'; \
            systemctl restart '${{ secrets.STAGING_FRONTEND_SERVICE || 'tour-guide-frontend' }}'"

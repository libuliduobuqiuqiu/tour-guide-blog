name: CD Production

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate tag format
        run: |
          echo "${{ github.event.inputs.release_tag }}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$'

      - name: Build release packages
        run: make package

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            dist/backend.tar.gz
            dist/frontend.tar.gz

  deploy-production:
    name: Deploy To Production
    needs: package
    runs-on: ubuntu-latest
    environment: production
    if: ${{ secrets.PROD_SSH_HOST != '' && secrets.PROD_SSH_USER != '' && secrets.PROD_SSH_KEY != '' && secrets.PROD_REMOTE_DIR != '' }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: dist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT || '22' }}" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifacts to production
        run: |
          scp -P "${{ secrets.PROD_SSH_PORT || '22' }}" dist/backend.tar.gz dist/frontend.tar.gz \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_REMOTE_DIR }}/"

      - name: Deploy with manual approval gate
        run: |
          ssh -p "${{ secrets.PROD_SSH_PORT || '22' }}" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "set -e; \
            mkdir -p '${{ secrets.PROD_REMOTE_DIR }}/backend' '${{ secrets.PROD_REMOTE_DIR }}/frontend'; \
            tar -xzf '${{ secrets.PROD_REMOTE_DIR }}/backend.tar.gz' -C '${{ secrets.PROD_REMOTE_DIR }}/backend'; \
            rm -rf '${{ secrets.PROD_REMOTE_DIR }}/frontend'; \
            mkdir -p '${{ secrets.PROD_REMOTE_DIR }}/frontend'; \
            tar -xzf '${{ secrets.PROD_REMOTE_DIR }}/frontend.tar.gz' -C '${{ secrets.PROD_REMOTE_DIR }}/frontend'; \
            systemctl restart '${{ secrets.PROD_BACKEND_SERVICE || 'tour-guide-backend' }}'; \
            systemctl restart '${{ secrets.PROD_FRONTEND_SERVICE || 'tour-guide-frontend' }}'"
